<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DENG</title>
<style>
*{box-sizing:border-box}
body{margin:0;background:#070b14;color:#fff;font-family:Arial,sans-serif}
main{max-width:650px;margin:auto;padding:60px 20px}
.logo{text-align:center;font-size:48px;font-weight:900;letter-spacing:12px}
.sub{text-align:center;color:#8991a5;margin:15px 0 50px;font-size:20px}
.search{display:flex;background:#141b2b;border:1px solid #29334a;border-radius:35px;padding:8px}
.search input{flex:1;background:transparent;border:0;outline:0;color:white;font-size:19px;padding:15px}
.search button{width:55px;height:55px;border:0;border-radius:50%;background:#397cff;color:white;font-size:25px}
h2{margin-top:45px}
#results{margin-top:20px}
.result{background:#111827;border:1px solid #29334a;border-radius:18px;padding:18px;margin:12px 0}
.result a{color:#fff;text-decoration:none;font-size:18px}
.note{margin-top:35px;background:#111827;border:1px solid #29334a;border-radius:20px;padding:20px;color:#cbd5e1;line-height:1.8}
</style>
</head>

<body>
<main>
<div class="logo">DENG</div>
<div class="sub">Dengê te, bi te re.</div>

<form class="search" id="searchForm">
<input id="q" placeholder="ابحث داخل DENG" required>
<button type="submit">⌕</button>
</form>

<h2 id="title">نتائج البحث</h2>
<div id="results"></div>

<div class="note">
🛡️ ابحث من خلال DENG. نتائج البحث ستظهر هنا داخل الصفحة.
</div>
</main>

<script>
const form=document.getElementById("searchForm");
const q=document.getElementById("q");
const results=document.getElementById("results");

form.addEventListener("submit",function(e){
e.preventDefault();

const text=q.value.trim();
if(!text)return;

results.innerHTML=`
<div class="result">
<a href="https://www.youtube.com/results?search_query=${encodeURIComponent(text)}">
▶️ مشاهدة نتائج "${text}" على YouTube
</a>
</div>

<div class="result">
<a href="https://www.google.com/search?q=${encodeURIComponent(text)}">
🔎 البحث عن "${text}" على الويب
</a>
</div>
`;
});
</script>
</body>
</html>
